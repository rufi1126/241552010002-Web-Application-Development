<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background-color: #fff;
        width: 300px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        overflow: hidden;
        text-align: center;
        transition: transform 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }

    .card h2 {
        margin: 15px 0 5px;
        font-size: 22px;
    }

    .card p {
        color: #777;
        font-size: 14px;
        margin: 0 15px 15px;
    }

    .card .social {
        display: flex;
        justify-content: center;
        gap: 15px;
        padding-bottom: 15px;
    }

    .card .social a {
        text-decoration: none;
        color: #555;
        font-size: 18px;
        transition: color 0.3s;
    }

    .card .social a:hover {
        color: #007BFF;
    }
</style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/300x200" alt="Foto Profil">
    <h2>Nama Lengkap</h2>
    <p>Deskripsi singkat tentang diri Anda. Misalnya: Web Developer & Designer.</p>
    <div class="social">
        <a href="#" title="Facebook">🌐</a>
        <a href="#" title="Twitter">🐦</a>
        <a href="#" title="Instagram">📷</a>
    </div>
</div>

</body>
</html>
