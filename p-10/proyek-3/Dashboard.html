<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Interaktif</title>
</head>
<body>

    <nav class='tab-nav'>
        <button class='tombol-tab aktif' data-tab='ikhtisar'>Ikhtisar</button>
        <button class='tombol-tab' data-tab='statistik'>Statistik</button>
        <button class='tombol-tab' data-tab='pengaturan'>Pengaturan</button>
    </nav>

    <section id='ikhtisar' class='panel aktif'>
        <div class='grid-statistik'>
            <div class='kartu-stat' data-target='1200'>
                <h3 class='penghitung'>0</h3>
                <p>Total Pengguna</p>
            </div>
            </div>
    </section>

    <section id='pengaturan' class='panel'>
        <div class='class=item-akordion'>
            <button class='judul-akordion'>Tema Tampilan</button>
            <div class='konten-akordion'>
                <button id='theme-btn'>Alihkan Mode Gelap</button>
            </div>
        </div>
    </section>

    <script src="dashboard.js"></script>
</body>
</html>
